<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CS Revision - Practice</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header>
    <div class="container navbar">
      <div class="brand"><a href="index.html">CS Revision</a></div>
      <div class="nav-stack">
        <nav class="nav-links">
          <a class="nav-link" href="index.html">Home</a>
          <a class="nav-link" href="topics.html">Topics</a>
          <a class="nav-link" href="flashcards.html">Flashcards</a>
          <a class="nav-link" href="quiz.html">Quiz</a>
          <a class="nav-link" href="progress.html">Progress</a>
          <a class="nav-link active" href="practice.html">Practice</a>
        </nav>
      </div>
    </div>
  </header>

  <main class="container practice-shell">
    <section class="hero compact">
      <div class="kicker">Skills Practice</div>
      <div class="page-head">
        <div>
          <h1 id="practiceTitle">Binary Practice</h1>
          <p id="practiceIntro" class="muted">Practise converting between denary and binary with instant feedback and working.</p>
        </div>
        <div class="actions">
          <a class="button btn-secondary" href="topics.html">Back to topics</a>
        </div>
      </div>
    </section>

    <section class="panel practice-panel">
      <div class="controls-row">
        <div class="control-group">
          <label for="difficulty">Difficulty</label>
          <select id="difficulty" class="practice-select">
            <option value="easy">Easy</option>
            <option value="medium">Medium</option>
            <option value="hard">Hard</option>
          </select>
        </div>

        <div class="control-group">
          <label for="mode">Mode</label>
          <select id="mode" class="practice-select"></select>
        </div>
      </div>

      <div class="question-card">
        <div class="kicker">Question</div>
        <h2 id="question" class="question-text">Loading question...</h2>

        <label class="control-group top-gap" for="answer">
          <span>Your answer</span>
          <input type="text" id="answer" class="practice-input" placeholder="Type your answer here">
        </label>

        <div class="button-row">
          <button id="checkBtn" class="button btn-primary">Check answer</button>
          <button id="nextBtn" class="button btn-secondary">Next question</button>
          <button id="newSetBtn" class="button btn-secondary">New set</button>
        </div>

        <div id="feedback" class="feedback-box"></div>
      </div>
    </section>
  </main>

  <footer>
    <div class="container">Built for GCSE and A Level Computer Science revision.</div>
  </footer>

  <script src="js/common.js"></script>
  <script src="js/practice.js"></script>
</body>
</html>
