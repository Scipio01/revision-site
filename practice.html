<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CS Revision - Practice</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header class="site-header">
    <div class="container">
      <h1>Practice</h1>
      <nav class="top-nav">
        <a href="index.html">Home</a>
        <a href="topics.html">Topics</a>
        <a href="flashcards.html">Flashcards</a>
        <a href="quiz.html">Quiz</a>
        <a href="progress.html">Progress</a>
      </nav>
    </div>
  </header>

  <main class="container">
    <section class="panel">
      <h2 id="practiceTitle">Binary Practice</h2>
      <p id="practiceIntro">Practise converting between denary and binary.</p>

      <div class="controls-row">
        <div class="control-group">
          <label for="difficulty">Difficulty</label>
          <select id="difficulty">
            <option value="easy">Easy</option>
            <option value="medium">Medium</option>
            <option value="hard">Hard</option>
          </select>
        </div>

        <div class="control-group">
          <label for="mode">Mode</label>
          <select id="mode">
            <option value="mixed">Mixed</option>
            <option value="denToBin">Denary → Binary</option>
            <option value="binToDen">Binary → Denary</option>
          </select>
        </div>
      </div>

      <div class="question-card">
        <h3 id="question">Loading question...</h3>

        <input type="text" id="answer" placeholder="Type your answer here">

        <div class="button-row">
          <button id="checkBtn" class="button">Check answer</button>
          <button id="nextBtn" class="button secondary-button">Next question</button>
          <button id="newSetBtn" class="button secondary-button">New set</button>
        </div>

        <div id="feedback" class="feedback-box"></div>
      </div>

      <div class="button-row top-gap">
        <a class="button secondary-button" href="topics.html">Back to topics</a>
      </div>
    </section>
  </main>

  <script src="js/common.js"></script>
  <script src="js/practice.js"></script>
</body>
</html>
