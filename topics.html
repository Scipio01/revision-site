<!DOCTYPE html>
<html lang="en"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Topics</title>
<link rel="stylesheet" href="css/style.css">
<script defer src="js/common.js"></script>
<script defer src="js/topics.js"></script>
</head><body class="theme-ocean">
<header><div class="container navbar">
  <div class="brand"><a href="index.html">CS Revision</a></div>
  <div class="nav-stack">
    <nav class="nav-links" aria-label="Main navigation">
      <a class="nav-link" data-nav href="index.html">Home</a>
      <a class="nav-link" data-nav href="topics.html">Topics</a>
      <a class="nav-link" data-nav href="progress.html">Progress</a>
    </nav>
    <div class="nav-tools">
      <select id="themeSelect" aria-label="Colour theme"><option value="theme-ocean">Ocean</option><option value="theme-forest">Forest</option><option value="theme-lilac">Lilac</option><option value="theme-warm">Warm</option></select>
      <button id="modeToggle"><span id="modeLabel">Light</span> mode</button>
    </div>
  </div>
</div></header>
<main class="container">
  <section class="hero compact">
    <div class="kicker">Choose a pathway</div>
    <div class="page-head">
      <div>
        <h1><span id="levelLabel">GCSE</span> Topics</h1>
        <p class="muted">Choose a topic, then open flashcards, a quiz or practice when available.</p>
      </div>
      <div class="level-switch" aria-label="Choose level">
        <a href="topics.html" id="gcseSwitch">GCSE</a>
        <a href="topics.html" id="alevelSwitch">A Level</a>
      </div>
    </div>
  </section>
  <section id="topicsList" class="grid"></section>
</main>
<footer class="container small">Choose a topic to continue.</footer>
</body></html>
