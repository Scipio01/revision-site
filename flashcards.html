<!DOCTYPE html>
<html lang="en"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flashcards</title>
<link rel="stylesheet" href="css/style.css">
<script defer src="js/common.js"></script>
<script defer src="js/flashcards.js"></script>
</head><body class="theme-ocean">
<header><div class="container navbar">
  <div class="brand"><a href="index.html">CS Revision</a></div>
  <div class="nav-stack">
    <nav class="nav-links" aria-label="Main navigation">
      <a class="nav-link" data-nav href="index.html">Home</a>
      <a class="nav-link" data-nav href="topics.html">Topics</a>
      <a class="nav-link" data-nav href="progress.html">Progress</a>
    </nav>
    <div class="nav-tools">
      <select id="themeSelect" aria-label="Colour theme"><option value="theme-ocean">Ocean</option><option value="theme-forest">Forest</option><option value="theme-lilac">Lilac</option><option value="theme-warm">Warm</option></select>
      <button id="modeToggle"><span id="modeLabel">Light</span> mode</button>
    </div>
  </div>
</div></header>
<main class="container flashcard-wrap">
  <section class="hero compact">
    <div class="kicker">Flashcards</div>
    <div class="page-head">
      <div>
        <h1 id="topicTitle">Topic</h1>
        <p id="cardCounter" class="muted">Card 1 of 1</p>
      </div>
      <div class="actions">
        <a class="btn-secondary button" href="topics.html">Back to topics</a>
        <a id="practiceLink" class="btn-secondary button" href="practice.html" style="display:none;">Practice</a>
        <a id="quizLink" class="btn-primary button" href="quiz.html">Go to quiz</a>
      </div>
    </div>
  </section>
  <section class="panel">
    <div id="flashcard" class="flashcard" aria-live="polite">
      <div class="flashcard-inner">
        <div class="flashcard-face flashcard-front"><div id="frontText"></div></div>
        <div class="flashcard-face flashcard-back"><div id="backText"></div></div>
      </div>
    </div>
    <p class="flashcard-tip">Click the card or use the flip button.</p>
    <div class="actions" style="justify-content:center;">
      <button id="prevBtn" class="btn-secondary">Previous</button>
      <button id="flipBtn" class="btn-primary">Flip card</button>
      <button id="nextBtn" class="btn-secondary">Next</button>
    </div>
  </section>
</main>
<footer class="container small">Progress is stored only in this browser.</footer>
</body></html>
