<html lang="en">
  
<head>
<meta charset="UTF-8">

<meta property="og:title" content="GCSE Computer Science Progress Tracker">

<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:title" content="GCSE Computer Science Progress Tracker">
<meta name="twitter:description" content="Track your revision progress and performance.">

<link rel="stylesheet" href="css/style.css">
<script defer src="js/common.js"></script>

</head>
  
  <body class="theme-ocean">
<header><div class="container navbar">
  <div class="brand"><a href="index.html">CS Revision</a></div>
  <div class="nav-stack">
    <nav class="nav-links" aria-label="Main navigation">
      <a class="nav-link" data-nav href="index.html">Home</a>
      <a class="nav-link" data-nav href="topics.html">Topics</a>
      <a class="nav-link" data-nav href="progress.html">Progress</a>
    </nav>
    <div class="nav-tools">
      <select id="themeSelect" aria-label="Colour theme"><option value="theme-ocean">Ocean</option><option value="theme-forest">Forest</option><option value="theme-lilac">Lilac</option><option value="theme-warm">Warm</option></select>
      <button id="modeToggle"><span id="modeLabel">Light</span> mode</button>
    </div>
  </div>
</div></header>
<main class="container">
  <section class="hero compact">
    <div class="kicker">Your local progress</div>
    <div class="page-head">
      <div>
        <h1>Progress</h1>
        <p>Last topic visited: <strong id="lastTopic">—</strong></p>
      </div>
      <div class="actions">
        <a class="btn-secondary button" href="topics.html">Back to topics</a>
        <button id="clearProgressBtn" class="btn-secondary">Clear progress</button>
      </div>
    </div>
  </section>
  <section id="progressGrid" class="grid"></section>
</main>
<footer class="container small">Progress is stored only in this browser.</footer>
</body></html>
